{% extends "base.html" %}

{% load static %}
{% block 'cabecalho' %}
    <link rel="stylesheet" href="{% static 'usuarios/css/cadastro.css' %}">
{% endblock %}

{% block 'conteudo' %}
    <div class="bg1">
        <div class="container">
            <div class="row"> <!-- Remova a classe justify-content-center -->
                <div class="col-md-6"> <!-- Ajusta a largura da coluna -->
                    <div class="box-titulo">
                        <div class="box-titulo-item">
                            <img src="{% static 'usuarios/img/logo.png' %}">
                        </div>
                        <div style="margin-top: auto; margin-bottom: auto" class="msg">
                            <h3>ESTUDO ACADEMICO</h3>
                        </div>
                    </div>
                    
                    <hr class="divisor">
                    <br>
                    
                    <div class="d-flex justify-content-start"> <!-- Ajuste a classe para justify-content-start -->
                        <h4 class="" style="font-size: 30px;">Sua plataforma de suporte academico</h4>
                    </div>
                </div>

                <div class="col-md-6 d-flex justify-content-end"> <!-- Ajuste a classe para justify-content-end -->
                    {% comment %} {% csrf_token %} {% endcomment %}
                    <div class="box-form">
                        <div class="box-cicle">
                            <div class="circle c1"></div>
                            <div class="circle c2"></div>
                            <div class="circle c3"></div>
                        </div>
                        <h3>Register Now</h3>
                        
                        <form method="post" action="{% url 'cadastro' %}">
                            {% csrf_token %}
                            <div class="form-group mb-2">
                                <label for="username" class="mb-0">Username</label>
                                <input type="text" class="form-control-6 col-12" id="username" name="username" required>
                            </div>
                            
                            <div class="form-group mb-2">
                                <label for="email" class="mb-0">Email</label>
                                <input type="email" class="form-control-6  col-12" id="email" name="email" required>
                            </div>
                            
                            <div class="form-group mb-2">
                                <label for="password" class="mb-0">Password</label>
                                <input type="password" class="form-control-6  col-12" id="password" name="password" required>
                            </div>
                            
                            <div class="form-group mb-2">
                                <label for="confirm_password" class="mb-0">Confirm Password</label>
                                <input type="password" class="form-control-6  col-12" id="confirm_password" name="confirm_password" required>
                            </div>
                            
                            <button style="margin-top: 10px; color: black" type="submit" class="btn btn-primary btn-sm">Register</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
